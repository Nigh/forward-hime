name: Release to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      ESLINT_USE_FLAT_CONFIG: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run eslint

      - name: Build
        run: npm run build

  publish:
    needs: test
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      ESLINT_USE_FLAT_CONFIG: "false"
    permissions:
      id-token: write
      contents: read
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node (npm registry)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve npm dist-tag
        id: dist
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" != *-* ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            PRERELEASE_ID=$(node -p "require('./package.json').version.split('-')[1].split('.')[0]")
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "tag=$PRERELEASE_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          if [ "${{ steps.dist.outputs.prerelease }}" = "true" ]; then
            npm publish --access public --tag "${{ steps.dist.outputs.tag }}"
          else
            npm publish --access public
          fi

      - name: Deprecate broken alpha builds
        if: steps.dist.outputs.prerelease == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for OLD in 1.4.0-alpha.0 1.4.0-alpha.1; do
            if [ "$VERSION" != "$OLD" ]; then
              npm deprecate "koishi-plugin-forward-hime@${OLD}" "Broken on Koishi; upgrade to ${VERSION} or later." || true
            fi
          done
